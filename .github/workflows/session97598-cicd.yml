name: Session 97598 CI/CD Workflow`

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore 97598.sln

      - name: Build
        run: dotnet build 97598.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test 97598.sln --configuration Release --no-build --verbosity normal