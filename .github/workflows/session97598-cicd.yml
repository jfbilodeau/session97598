name: Session 97598 CI/CD Workflow

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # schedule:
  #   - cron: '0 15 * * 1-5'
  repository_dispatch: 
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore 97598.sln

      - name: Build
        run: dotnet build 97598.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test 97598.sln --configuration Release --no-build --verbosity normal

      - name: Publish production build
        run: dotnet publish Session97598.csproj --configuration Release --no-build --output ./artifacts/publish

      - name: Package production build
        run: |
          cd artifacts/publish
          zip -r ../../session97598.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: session97598.zip
          path: session97598.zip
          if-no-files-found: error

  deploy-environment:
    runs-on: ubuntu-latest
    steps:          
      - name: Checkout repository
        uses: actions/checkout@v4
        with: 
          filter: iac/*

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDS }}

      - name: Deploy Bicep template to Azure Web App
        run: az deployment group create --resource-group session97598 --template-file iac/deploy.bicep

  deploy-application:
    runs-on: ubuntu-latest
    needs: 
      - build-and-test
      - deploy-environment
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: session97598.zip
          path: .

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDS }}

      - name: Deploy artifact to Azure Web App
        run: az webapp deploy --resource-group session97598 --src-path session97598.zip --name session97598

