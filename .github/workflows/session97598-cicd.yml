name: Session 97598 CI/CD Workflow`

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # schedule:
  #   - cron: '0 15 * * 1-5'
  repository_dispatch: 
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore 97598.sln

      - name: Build
        run: dotnet build 97598.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test 97598.sln --configuration Release --no-build --verbosity normal
      
  deploy-to-dev:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: Dev
    steps:
      - name: Deploy to Development
        run: echo "Deploying to development environment..."
      
  deploy-to-prod:
    runs-on: ubuntu-latest
    needs: deploy-to-dev
    environment: Prod
    steps:
      - name: Deploy to Production
        run: echo "Deploying to production environment..."